<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Flashcards de Estudo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
        }

        /* Container do Flashcard com efeito 3D */
        .card-container {
            width: 350px;
            height: 300px; /* Aumentei um pouco a altura para caber melhor as imagens */
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Lados do Card */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column; /* Alinha itens em coluna para texto + imagem */
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .card-front {
            background-color: #ffffff;
            color: #333;
            border: 2px solid #0076ff;
        }

        .card-back {
            background-color: #0076ff;
            color: white;
            transform: rotateY(180deg);
        }

        /* Estilo para as imagens dentro do card */
        .card-face img {
            max-width: 100%;
            max-height: 150px; /* Limita a altura para não quebrar o layout */
            border-radius: 5px;
            margin-top: 10px;
            object-fit: contain;
        }

        /* Botões de Navegação */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #555;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>Flashcards Pro</h1>
        <p>Clique no cartão para ver a resposta</p>
    </header>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="card-face card-front" id="question">
                </div>
            <div class="card-face card-back" id="answer">
                </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="prevCard()">Anterior</button>
        <button id="nextBtn" onclick="nextCard()">Próximo</button>
    </div>

    <script>
        // LISTA DE FLASHCARDS COM IMAGENS
        // Você pode colocar a URL da imagem no campo "imageQuestion" ou "imageAnswer".
        // Se não quiser imagem em algum, basta deixar como string vazia "".
        const flashcards = [
            { 
                question: "Que logo de tecnologia é este?", 
                imageQuestion: "https://images.unsplash.com/photo-1618401471353-b98afee0b2eb?w=400", // Link de exemplo (GitHub logo/art)
                answer: "É o GitHub!",
                imageAnswer: ""
            },
            { 
                question: "Qual é o mascote do GitHub?", 
                imageQuestion: "",
                answer: "O Octocat (gato-polvo).",
                imageAnswer: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400" // Outra imagem de exemplo
            },
            { 
                question: "O que este código JavaScript faz?", 
                imageQuestion: "",
                answer: "Exibe um alerta na tela.",
                imageAnswer: ""
            }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('flashcard');
        const questionElement = document.getElementById('question');
        const answerElement = document.getElementById('answer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function updateCard() {
            cardElement.classList.remove('flipped');
            
            setTimeout(() => {
                const current = flashcards[currentIndex];

                // Monta a Frente (Pergunta)
                let frontHTML = `<p>${current.question}</p>`;
                if (current.imageQuestion) {
                    frontHTML += `<img src="${current.imageQuestion}" alt="Imagem da pergunta">`;
                }
                questionElement.innerHTML = frontHTML;

                // Monta o Verso (Resposta)
                let backHTML = `<p>${current.answer}</p>`;
                if (current.imageAnswer) {
                    backHTML += `<img src="${current.imageAnswer}" alt="Imagem da resposta">`;
                }
                answerElement.innerHTML = backHTML;

            }, 150);

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === flashcards.length - 1;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        updateCard();
    </script>
</body>
</html>
