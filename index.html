<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Flashcards de Estudo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
        }

        /* Container do Flashcard com efeito 3D */
        .card-container {
            width: 350px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        /* Classe que faz o card girar */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Lados do Card */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .card-front {
            background-color: #ffffff;
            color: #333;
            border: 2px solid #0076ff;
        }

        .card-back {
            background-color: #0076ff;
            color: white;
            transform: rotateY(180deg);
        }

        /* Botões de Navegação */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #555;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>Flashcards Pro</h1>
        <p>Clique no cartão para ver a resposta</p>
    </header>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="card-face card-front" id="question">
                Carregando pergunta...
            </div>
            <div class="card-face card-back" id="answer">
                Carregando resposta...
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="prevCard()">Anterior</button>
        <button id="nextBtn" onclick="nextCard()">Próximo</button>
    </div>

    <script>
        // Adicione ou modifique suas perguntas e respostas aqui dentro:
        const flashcards = [
            { question: "O que significa HTML?", answer: "HyperText Markup Language" },
            { question: "Para que serve o CSS?", answer: "Para estilizar e dar design às páginas web." },
            { question: "Como declarar uma variável constante em JavaScript?", answer: "Utilizando a palavra-chave 'const'." },
            { question: "O que é o GitHub?", answer: "Uma plataforma de hospedagem de código e colaboração baseada no Git." }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('flashcard');
        const questionElement = document.getElementById('question');
        const answerElement = document.getElementById('answer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Atualiza o conteúdo do card na tela
        function updateCard() {
            // Remove a rotação para mostrar a frente primeiro
            cardElement.classList.remove('flipped');
            
            // Espera um tempinho para trocar o texto enquanto o card desvira
            setTimeout(() => {
                questionElement.innerText = flashcards[currentIndex].question;
                answerElement.innerText = flashcards[currentIndex].answer;
            }, 150);

            // Controla a ativação dos botões
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === flashcards.length - 1;
        }

        // Gira o card ao clicar
        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        // Avança para o próximo card
        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        // Volta para o card anterior
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Inicializa o primeiro card
        updateCard();
    </script>
</body>
</html>
